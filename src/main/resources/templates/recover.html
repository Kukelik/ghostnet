<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bergung eintragen</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script th:src="@{/js/map.js}"></script>
</head>

<body class="container">
<div class="d-flex flex-column align-items-center">
    <h1>GHOST NET FISHING</h1>
    <hr>
    <div class="nav">
        <a href="/" class="back">← Zurück zur Übersicht</a>
        <span class="mx-1">|</span>
        <a href="/report" class="mx-2">Geisternetz melden</a>
        <span class="mx-1">|</span>
        <a href="/nets-to-recover" class="mx-2 active">Zu bergende Netze</a>
        <span class="mx-1">|</span>
        <a href="/map" class="mx-2">🗺️ Weltkarte</a>
    </div>
</div>

<h2>Bergung eintragen</h2>
<div class="info-box">
    <p><strong>Netz ID:</strong> <span th:text="${net.id}"></span></p>
    <p><strong>Position:</strong> <span th:text="${net.latitude}"></span>, <span th:text="${net.longitude}"></span></p>
    <p><strong>Größe:</strong> <span th:text="${net.estimatedSize}"></span></p>
</div>

<form th:action="@{/recover/{id}(id=${net.id})}" method="post">
    <h3>Deine Daten</h3>
    <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" required/>
    </div>
    <div class="form-group">
        <label>Telefonnummer</label>
        <input type="text" name="phoneNumber" required/>
    </div>
    <button type="submit" class="btn">Bergung eintragen</button>
</form>
</body>
</html>
