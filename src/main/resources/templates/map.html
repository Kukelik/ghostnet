<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Weltkarte – Ghost Net Fishing</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <script th:src="@{/js/map.js}"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body class="container">
<div class="d-flex flex-column align-items-center">
    <h1>GHOST NET FISHING</h1>
    <hr>
    <div class="nav">
        <a href="/" class="back">← Zurück zur Übersicht</a>
        <span class="mx-1">|</span>
        <a href="/report" class="mx-2">Geisternetz melden</a>
        <span class="mx-1">|</span>
        <a href="/nets-to-recover" class="mx-2">Zu bergende Netze</a>
        <span class="mx-1">|</span>
        <a href="/map" class="mx-2 active">🗺️ Weltkarte</a>
    </div>
</div>

<h2>Weltkarte – Zu bergende Geisternetze</h2>

<div id="net-data" style="display:none">
    <span th:each="net : ${nets}"
          th:data-id="${net.id}"
          th:data-lat="${net.latitude}"
          th:data-lng="${net.longitude}"
          th:data-size="${net.estimatedSize}"
          th:data-status="${net.status}"
          class="net-item">
    </span>
</div>

<div id="map"></div>

<script>
    const map = L.map('map').setView([20, 0], 2);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    document.querySelectorAll('.net-item').forEach(el => {
        const lat = parseFloat(el.dataset.lat);
        const lng = parseFloat(el.dataset.lng);
        const id = el.dataset.id;
        const size = el.dataset.size;
        const status = el.dataset.status;

        if (lat && lng) {
            const color = status === 'GEMELDET' ? 'red' : 'orange';
            const marker = L.circleMarker([lat, lng], {
                radius: 10,
                fillColor: color,
                color: '#fff',
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map);

            marker.bindPopup(`
                <strong>Geisternetz #${id}</strong><br/>
                Größe: ${size}<br/>
                Status: ${status}
            `);
        }
    });
</script>
</body>
</html>
