<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Zu bergende Netze</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script th:src="@{/js/map.js}"></script>
</head>

<body class="container">
<div class="d-flex flex-column align-items-center">
    <h1>GHOST NET FISHING</h1>
    <hr>
        <div class="nav">
            <a href="/" class="back">← Zurück zur Übersicht</a>
            <span class="mx-1">|</span>
            <a href="/report" class="mx-2">Geisternetz melden</a>
            <span class="mx-1">|</span>
            <a href="/nets-to-recover" class="mx-2 active">Zu bergende Netze</a>
            <span class="mx-1">|</span>
            <a href="/map" class="mx-2">🗺️ Weltkarte</a>
        </div>
</div>

<h2>Zu bergende Netze</h2>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Latitude</th>
        <th>Longitude</th>
        <th>Größe</th>
        <th>Status</th>
        <th>Aktion</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="net : ${nets}">
        <td th:text="${net.id}"></td>
        <td th:text="${net.latitude}"></td>
        <td th:text="${net.longitude}"></td>
        <td th:text="${net.estimatedSize}"></td>
        <td th:text="${net.status}"></td>
        <td>
            <a th:href="@{/recover/{id}(id=${net.id})}" class="btn"
               th:if="${net.status.name() == 'GEMELDET'}">Bergen</a>
        </td>
    </tr>
    </tbody>
</table>
<p class="text-center" th:if="${#lists.isEmpty(nets)}" style="color: #888; margin-top: 15px;">
    Keine zu bergende Netze vorhanden.
</p>
</body>
</html>
