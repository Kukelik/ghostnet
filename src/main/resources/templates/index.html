<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ghost Net Fishing</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1000px; margin: 0 auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #4a90a4; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .btn { padding: 6px 12px; background-color: #4a90a4; color: white;
            border: none; cursor: pointer; text-decoration: none; border-radius: 4px; }
        .btn-danger { background-color: #e74c3c; }
        .nav { margin-bottom: 20px; }
        .nav a { margin-right: 15px; color: #4a90a4; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
<h1>🌊 Ghost Net Fishing</h1>
<div class="nav">
    <a href="/report">Geisternetz melden</a>
    <a href="/nets-to-recover">Zu bergende Netze</a>
    <a href="/map">🗺️ Weltkarte</a>
</div>

<h2>Alle Geisternetze</h2>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Latitude</th>
        <th>Longitude</th>
        <th>Größe</th>
        <th>Status</th>
        <th>Bergende Person</th>
        <th>Aktionen</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="net : ${nets}">
        <td th:text="${net.id}"></td>
        <td th:text="${net.latitude}"></td>
        <td th:text="${net.longitude}"></td>
        <td th:text="${net.estimatedSize}"></td>
        <td th:text="${net.status}"></td>
        <td th:text="${net.recoveringPerson != null ? net.recoveringPerson.name : '-'}"></td>
        <td>
            <a th:href="@{/recover/{id}(id=${net.id})}" class="btn"
               th:if="${net.status.name() == 'REPORTED'}">Bergen</a>
            <form th:action="@{/mark-recovered/{id}(id=${net.id})}" method="post"
                  style="display:inline"
                  th:if="${net.status.name() == 'RECOVERY_PENDING'}">
                <button type="submit" class="btn btn-danger">Als geborgen markieren</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
