<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ghost Net Fishing</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script th:src="@{/js/map.js}"></script>
</head>

<body class="container">
<div class="d-flex flex-column align-items-center">
    <h1>GHOST NET FISHING</h1>
    <hr>
    <div class="nav">
        <a href="/report" class="mx-2">Geisternetz melden</a>
        <span class="mx-1">|</span>
        <a href="/nets-to-recover" class="mx-2">Zu bergende Netze</a>
        <span class="mx-1">|</span>
        <a href="/map" class="mx-2">🗺️ Weltkarte</a>
    </div>
</div>

<h2>Alle Geisternetze</h2>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Latitude</th>
        <th>Longitude</th>
        <th>Größe</th>
        <th>Status</th>
        <th>Bergende Person</th>
        <th>Aktionen</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="net : ${nets}">
        <td th:text="${net.id}"></td>
        <td th:text="${net.latitude}"></td>
        <td th:text="${net.longitude}"></td>
        <td th:text="${net.estimatedSize}"></td>
        <td th:text="${net.status}"></td>
        <td th:text="${net.recoveringPerson != null ? net.recoveringPerson.name : '-'}"></td>
        <td>
            <a th:href="@{/recover/{id}(id=${net.id})}" class="btn"
               th:if="${net.status.name() == 'GEMELDET'}">Bergen</a>
            <form th:action="@{/mark-recovered/{id}(id=${net.id})}" method="post"
                  style="display:inline"
                  th:if="${net.status.name() == 'BERGUNG_AUSSTEHEND'}">
                <button type="submit" class="btn btn-danger">Als geborgen markieren</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
    <p class="text-center" th:if="${#lists.isEmpty(nets)}" style="color: #888; margin-top: 15px;">
        Keine Geisternetze vorhanden.
    </p>
</body>
</html>
